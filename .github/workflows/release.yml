name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Build, Version & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.1.11
        with:
          versionSpec: '6.x'

      - name: Calculate Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.1.11

      - name: Display Version
        run: echo "Version:${{ steps.gitversion.outputs.semVer }}"

      - name: Restore
        run: dotnet restore

      - name: Restore test fixtures
        run: dotnet restore tests/RoslynCodeGraph.Tests/Fixtures/TestSolution/TestSolution.slnx

      - name: Build
        run: dotnet build --no-restore -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Test
        run: dotnet test --no-build --verbosity normal

      - name: Pack
        run: dotnet pack src/RoslynCodeGraph/RoslynCodeGraph.csproj --no-build -p:PackageVersion=${{ steps.gitversion.outputs.semVer }} -o ./artifacts

      - name: Push to NuGet
        if: env.NUGET_API_KEY != ''
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.gitversion.outputs.semVer }}"
          git push origin "v${{ steps.gitversion.outputs.semVer }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.gitversion.outputs.semVer }}
          name: v${{ steps.gitversion.outputs.semVer }}
          generate_release_notes: true
          files: ./artifacts/*.nupkg
